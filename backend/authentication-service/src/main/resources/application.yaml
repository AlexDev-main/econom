spring:
  application:
    name: authentication-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authentication_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update

      show-sql: true

      properties:
        hibernate:
          format_sql: true

    jackson:
      serialization:
        INDENT_OUTPUT: true

  server:
    port: 8080
