spring:
  application:
    name: authentication-service

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update

      show-sql: true

      properties:
        hibernate:
          format_sql: true

    jackson:
      serialization:
        INDENT_OUTPUT: true

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 900000

  refresh-token:
    expiration: 604800000 # 7 días

  cors:
    allowed-origins:
      - http://localhost:4200

    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS

    allowed-headers:
      - Authorization
      - Content-Type

    allow-credentials: true

app:
  admin:
    email: ${APP_ADMIN_EMAIL}
    password: ${APP_ADMIN_PASSWORD}