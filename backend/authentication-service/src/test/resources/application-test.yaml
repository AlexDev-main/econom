spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

security:
  jwt:
    # >= 32 caracteres para evitar WeakKeyException con HS256
    secret: test-secret-key-with-at-least-thirty-two-chars
    expiration: 900000

  refresh-token:
    expiration: 604800000

app:
  admin:
    email: test-admin@local
    password: test-admin-password

